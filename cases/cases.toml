# Evaluation cases. `baseline` is the HF reference CER/chrF measured in the RELEASE
# regime: original shipped weights (bf16), the model's own infer() defaults, CUDA (GB10);
# `tol` is how far llama.cpp may drift and still pass. image/ground_truth are filenames
# under data/images and data/ground_truth.

[[cases]]
model = "v1"
label = "single-view scan"
image = "test-1.jpeg"
ground_truth = "test-1-ground-truth.txt"
# Fragile image: llama Metal (~0.32) sits ~0.04 above the CUDA HF ref; wide tol.
baseline = { cer = 0.2811, chrf = 67.24 }
tol = { cer = 0.06, chrf = 6.0 }

[[cases]]
model = "v2"
label = "single-view scan"
image = "test-1.jpeg"
ground_truth = "test-1-ground-truth.txt"
# v2 reads this small single view poorly (HF worse than llama here); wide band.
baseline = { cer = 0.7727, chrf = 14.00 }
tol = { cer = 0.12, chrf = 8.0 }

[[cases]]
model = "v1"
label = "multi-tile (dynamic resolution)"
image = "test-1-positive.png"
ground_truth = "test-1-ground-truth.txt"
baseline = { cer = 0.0000, chrf = 100.00 }
tol = { cer = 0.03, chrf = 3.0 }

[[cases]]
model = "v2"
label = "multi-tile (dynamic resolution)"
image = "test-1-positive.png"
ground_truth = "test-1-ground-truth.txt"
baseline = { cer = 0.0236, chrf = 97.05 }
tol = { cer = 0.03, chrf = 3.0 }

[[cases]]
model = "v1"
label = "multi-column grid (2x3)"
image = "test-multi-grid.jpg"
ground_truth = "test-multi-grid-ground-truth.txt"
baseline = { cer = 0.0584, chrf = 93.57 }
tol = { cer = 0.03, chrf = 3.0 }

[[cases]]
model = "v2"
label = "multi-column grid (2x3)"
image = "test-multi-grid.jpg"
ground_truth = "test-multi-grid-ground-truth.txt"
baseline = { cer = 0.0211, chrf = 98.02 }
tol = { cer = 0.03, chrf = 3.0 }

[[cases]]
model = "v1"
label = "webpage screenshot (tall)"
image = "webpage-tall.png"
ground_truth = "webpage-tall-ground-truth.txt"
# HF reads the tall page near-perfectly (0.0319); llama.cpp matches it (~0.0315) after
# the deepseek-ocr fuse_row tile-drop fix in mtmd-image.cpp. Only this case caught that
# bug -- the 2x3 grid image hit it too, but its text is big enough to recover from the
# global view. This page's text is tile-only, so it fails if right-column tiles get
# dropped again.
baseline = { cer = 0.0319, chrf = 96.53 }
tol = { cer = 0.03, chrf = 3.0 }

[[cases]]
model = "unlimited"
label = "single-view scan"
image = "test-1.jpeg"
ground_truth = "test-1-ground-truth.txt"
# Reference runs the release default R-SWA (infer()'s ring buffer, window 128);
# llama.cpp matches it with LLAMA_SWA_TYPE_REFERENCE (PR #24975). Band is tight on
# purpose: plain master runs full MHA (~0.21 on CUDA) and FAILS until R-SWA lands.
baseline = { cer = 0.1591, chrf = 77.48 }
tol = { cer = 0.04, chrf = 5.0 }
