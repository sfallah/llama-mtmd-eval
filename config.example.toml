# Copy to config.toml and edit for your machine. Every value can also be overridden
# by an env var (MTMD_LLAMA_BIN, MTMD_GGUF_DIR, MTMD_HF_DIR, MTMD_DEVICE) or a CLI flag.
# CLI > env > config.toml > built-in defaults.

# Path to the llama.cpp llama-mtmd-cli binary (built with your backend: Metal / CUDA).
llama_bin = "/path/to/llama.cpp/build/bin/llama-mtmd-cli"

# Directory holding the GGUF models. models.toml gguf/mmproj paths are resolved against it.
gguf_dir = "/path/to/gguf_models"

# Directory holding the HF model dirs. models.toml hf.dir paths are resolved against it.
# Only needed by the `hf` and `compare` commands.
hf_dir = "/path/to/hf_models"

# HF device for the reference runner: auto | cuda | mps | cpu. "auto" picks cuda when
# available, else cpu. mps/cpu run the CPU shim — scores are approximate, not baselines.
device = "auto"
